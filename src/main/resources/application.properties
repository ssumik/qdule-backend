quarkus.openapi-generator.codegen.spec.openapi_yml.model-name-prefix=QuarkusOpenApiGenerator
quarkus.application.name=qdule-backend

quarkus.datasource.db-kind=postgresql 
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASS}

quarkus.datasource.jdbc.url=${JDBC_URL}
quarkus.datasource.jdbc.max-size=16
quarkus.datasource.jdbc.metrics.enabled=true

quarkus.hibernate-orm.database.generation=none

quarkus.swagger-ui.path=/api
quarkus.smallrye-openapi.path=/openapi
quarkus.http.root-path=/
quarkus.http.non-application-root-path=/q

smallrye.jwt.sign.key=${JWT_PRIVATE_KEY}
# used in the dev profile to sign JWTs for testing purposes
# smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=qdule

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ALLOWED_ORIGINS}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
